<!DOCTYPE html>
<html>
    
    <head>
        
        <title>Document</title>

        <style>

            * {
            font-family: Arial, Helvetica, sans-serif;
            }

            body{
                background-color: rgb(230,230,230);
            }

            table{
                width: 100%;
                border-collapse: collapse;
            }

            h2{
                text-align: center;
            }

            tr{
                border: 2px black solid;
            }

            th{
                border-right: 2px black solid;
                border-left: 2px black solid;
            }

            fieldset{
                width: 50%;
            }

            label, input, button, select, textarea{
                margin: 10px;
            }

            form{
                font-weight: bold;
            }

        </style>
    
    </head>
    
    <body>

        <h2>HTML Tables and Forms Assignment</h2>

        <table>

            <tr>

                <th><b>Name</b></th>
                <th><b>Maths</b></th>
                <th><b>Science</b></th>
                <th><b>English</b></th>
            
            </tr>

            <tr style="border-bottom: 1px black solid;">

                <th>John</th>
                <th>85</th>
                <th>90</th>
                <th>88</th>

            </tr>

            <tr style="border-top: 1px black solid;">

                <th>Mary</th>
                <th>92</th>
                <th>87</th>
                <th>95</th>

            </tr>

        </table>

        <br>

        <table>

            <tr>

                <th><b>Day</b></th>
                <th><b>9.00 - 10.00</b></th>
                <th><b>10.00 - 11.00</b></th>

            </tr>

            <tr>

                <th>Monday</th>
                <th colspan="2">Web Development</th>

            </tr>

            <tr>

                <th>Tuesday</th>
                <th>HTML</th>
                <th>CSS</th>

            </tr>

        </table>

        <br>

        <table>

            <tr>

                <th><b>Name</b></th>
                <th><b>Department</b></th>
                <th><b>Role</b></th>

            </tr>

            <tr>

                <th rowspan="2">John</th>
                <th>IT</th>
                <th>Developer</th>

            </tr>

            <tr>

                <th>IT</th>
                <th>Tester</th>

            </tr>

        </table>

        <br>

        <fieldset>

            <form style="padding: 5px;">

                <label>Full Name:</label>
                <br>
                <input type="text">

                <br>

                <label>Email:</label>
                <br>
                <input type="email">
                
                <br>

                <label>Password:</label>
                <br>
                <input type="password">

                <br>

                <button>Register</button>
                
            </form>

        </fieldset>

        <br>

        <fieldset>

            <form>

                <label>Gender:</label>
                <br>
                <input type="radio">Male
                <input type="radio">Female
                <input type="radio">Other

                <br><br>

                <label>Skills:</label>
                <br>
                <input type="checkbox">HTML
                <input type="checkbox">CSS
                <input type="checkbox">JavaScript
                <input type="checkbox">React

                <br><br>

                <label>Country:</label>
                <br>
                <select>
                    <option selected>Sri Lanaks</option>
                    <option>India</option>
                </select>

                <br><br>

                <button>Submit</button>


            </form>

        </fieldset>

        <br>

        <fieldset>

            <form>

                <label>Name:</label>
                <br>
                <input type="text">
                
                <br>

                <label>Email:</label>
                <br>
                <input type="email">

                <br>

                <label>Phone Number:</label>
                <br>
                <input type="number">

                <br>

                <label>Date of Birth:</label>
                <br>
                <input type="date">

                <br>

                <label>Upload Resume</label>
                <br>
                <button>Choose File</button>
                <label style="font-weight: lighter; margin: 0%;">No file Chosen</label>

                <br>

                <label>About Yourself:</label>
                <br>
                <textarea rows="5" cols="40"></textarea>
                
                <br><br>

                <button>Apply</button>
                
            </form>

        </fieldset>
    
    </body>

    </html>
