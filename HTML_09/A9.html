<!DOCTYPE html>

<html>

    <head>
    
        <title>Document</title>

        <style>

            .block{
                color: cornflowerblue;
                background-color: black;
                display: block;
                margin: 5px;
                padding: 5px;
                text-align: center;
                text-decoration: none;
            }

            .inline{
                background-color: rgb(6, 102, 49);
                color: brown;
            }

            .inlineblock{
                background-color: brown;
                color: antiquewhite;
                width: 50%;
            }

            .none{
                display: none;
            }


        </style>
    
    </head>

    <body>
        
        <a href="#" class="block">Block</a>
        <a href="#" class="block">Block</a>
        <a href="#" class="block">Block</a>

        <span class="inline">inline</span>
        <span class="inline">inline</span>
        <span class="inline">inline</span>

        <div class="inlineblock">inlineblock</div>
        <div class="none">inlineblock</div>
        <div class="inlineblock">inlineblock</div>



    </body>

</html>
