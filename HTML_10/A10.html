<!DOCTYPE html>
<html>

    <head>

        <title>Document</title>

    </head>

    <style>

        main{
            width: 100%;
        }

        .r1f1, .r1f2{
            background-color: crimson;   
            height: 100px;     
        }

        .r2f1, .r3f1, .r2c1{
            background-color: darkgoldenrod;
        }

        .r2f2, .r3f2, .r2c2b1, .r2c2b2{
            background-color: blueviolet;
        }

        .r4f1, .r4f2, .r4f3, .r3c1, .r3c2, .r3c3{
            background-color: darkcyan;
        }

        .r1, .r2, .r3, .r4, .row2, .row3{
            display: flex;
            gap: 10px;
        }

        .r2c2b1, .r2c2b2{
            display: block;
        }

        .r1f1{
            flex: 2;
            margin-bottom: 10px;
        }

        .r1f2{
            flex: 1;
            margin-bottom: 10px;
        }

        .r2f1{
            flex: 4;
            padding-bottom: 10px;
        }

        .r2f2{
            flex: 6;            
            margin-bottom: 10px;
        }

        .r3f1{
            flex: 4;
            margin-bottom: 10px;
        }

        .r3f2{
            flex: 6;
            margin-bottom: 10px;
        }

        .r4f1{
            flex: 3;
        }

        .r4f2{
            flex: 4;
        }

        .r4f3{
            flex: 3;
        }

        .r2f1, .r2f2{
            height: 150px;
        }

        .r3f1, .r3f2{
            height: 150px;
        }

        .r4f1{
            flex: 3;
            height: 100px;
        }

        .r4f2{
            flex: 4;
            height: 100px;
        }

        .r4f3{
            flex: 3;
            height: 100px;
        }

        .r2c1{
            height: 300px;
            flex: 3;
        }

        .r2c2{
            height: 300px;
            flex: 4;
        }

        .r3c1{
            height: 100px;
            flex: 3;
            margin-top: 10px
        }

        .r3c2{
            height: 100px;
            flex: 4;
            margin-top: 10px
        }

        .r3c3{
            height: 100px;
            flex: 3;
            margin-top: 10px
        }

        
    </style>

    <body>
    
        <div class="main">

            <div class="r1">

                <div class="r1f1"></div>
                <div class="r1f2"></div>
            
            </div>

            <div class="r2">

                <div class="r2f1"></div>
                <div class="r2f2"></div>

            </div>
            
            <div class="r3">

                <div class="r3f1"></div>
                <div class="r3f2">
                    <div class="r3f2b1"></div>
                    <div class="r3f2b2"></div>
                </div>
            
            </div>

            <div class="r4">
                
                <div class="r4f1"></div>
                <div class="r4f2"></div>
                <div class="r4f3"></div>
            
            </div>  
        
        </div>

        
        
        
        
        
        <br><br>

        
        
        
        
        
        
        
        <div class="main1">

            <div class="r1">

                <div class="r1f1"></div>
                <div class="r1f2"></div>
            
            </div>

            <div class="row2">

                <div class="r2c1"></div>
                <div class="r2c2"></div>

            </div>

            <div class="row3">

                <div class="r3c1"></div>
                <div class="r3c2"></div>
                <div class="r3c3"></div>

            </div>

        </div>

    </body>

</html>
