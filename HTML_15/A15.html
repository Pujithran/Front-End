<!DOCTYPE html>

<html lang="en">

    <head>

        <title>Document</title>

        <style>

        </style>

    </head>

    <body>

        <ol>

    
        <li>   
            
            <h3>Static Position</h3>
        
            <div style="height: 200px; width: 50%; border: 2px black solid; margin: 10px;">

                <div class="static" style="height: 40px; width: 40px; background-color: brown; margin: 10px;"></div>

            </div>

        </li>

        <li>

            <h3>Relative Position</h3>

            <div style="height: 200px; width: 50%; border: 2px black solid; margin: 10px; position: relative;">

                <div style="height: 40px; width: 40px; background-color: rgb(67, 165, 42); margin: 10px; position: relative;"></div>

            </div>

        </li>

        <li>

            <h3 >Absolute Position</h3>

            <div style="height: 200px; width: 50%; border: 2px black solid; margin: 10px; position: relative;">

                <div style="height: 40px; width: 40px; background-color: rgb(42, 71, 165); margin: 10px; position: absolute;"></div>

            </div>

        </li>

        </ol>

        <br><br>

        <div style="position: relative; height: 250px; width: 40%;">

            <div style="width: 250px; height: 150px; background-color: rgb(165, 42, 42); position: absolute; top: 10px; left: 10px; z-index: 3;"></div>
            <div style="width: 250px; height: 150px; background-color: rgb(56, 165, 42); position: absolute; top: 20px; left: 20px; z-index: 2;"></div>
            <div style="width: 250px; height: 150px; background-color: rgb(42, 120, 165); position: absolute; top: 30px; left: 30px; z-index: 1;"></div>

        </div>

        <br><br>

        <div style="height: 400px; width: 50%; border: 2px black solid; background-color: rgb(9, 97, 90); position: relative; margin-left: 20px;">

            <div style="height: 150px; width: 150px; border: 5px black solid; background-color: brown; position: absolute; top: 50px; left: 100px;"></div>
            <div style="height: 150px; width: 150px; border: 5px black solid; background-color: rgb(33, 204, 42); position: absolute; top: 100px; left: 150px;"></div>
            <div style="height: 150px; width: 150px; border: 5px black solid; background-color: rgb(41, 174, 197); position: absolute; top: 175px; left: 125px;"></div>
            <div style="height: 150px; width: 150px; border: 5px rgb(251, 255, 0) solid; background-color: blueviolet; position: absolute; top: 155px; left: 250px;"></div>

        </div>

        <div style="height: 1000px; width: 80%; position: relative; margin: 20px;">

            <div style="height: 500px; width: 400px; position: absolute; top: 10px; left: 10px;"><img src="./blonde.webp" height="500px"></div>
            <div style="height: 500px; width: 502px; position: absolute; top: 10px; left: 10px; background-color: rgba(179, 42, 42, 0.411);"></div>

        </div>

    </body>

</html>
