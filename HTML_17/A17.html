<!DOCTYPE html>

<html lang="en">

    <head>

        <title>Document</title>

        <style>

            div{
                margin: 30px;
            }

            .box2:hover{
                transform: translateZ(-2px);
            }

        </style>

    </head>

    <body style="background-color: grey;">

        <div class="box1" style="width: 100px; height: 100px; background-color: black; border: 2px solid whitesmoke; transform: translate(40px, 20px);"></div>
        
        <div class="box2" style="width: 100px; height: 100px; background-color: rgb(178, 45, 45); border: 2px solid whitesmoke; transform: rotatez(26deg);"></div>
        
        <div style="width: 100px; height: 100px; background-color: rgb(55, 155, 56); border: 2px solid whitesmoke; transform: scale(0.5);"></div>
      
        <div style="width: 100px; height: 100px; background-color: rgb(46, 96, 132); border: 2px solid whitesmoke; transform: skewy(20deg);"></div>

        <div style="width: 100px; height: 100px; background-color: rgb(141, 55, 168); border: 2px solid whitesmoke; transform: matrix(1, 0.3, 0.3, 1, 20, 50);"></div>

    </body>

</html>
