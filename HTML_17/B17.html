<!DOCTYPE html>

<html lang="en">

<head>

    <title>Document</title>

    <style>

        th{
            width: 50%;
        }

        td{
            height: 150px;
            padding: 30px;
        }

    </style>

</head>

<body>
    
    <table border="1" style="width: 100%; border: 2px solid black; margin: 5px; border-collapse: collapse;">

        <tr>

            <th>Before</th>
            <th>After</th>

        </tr>

        <tr>

            <td><div style="height: 100px; width: 100px; background-color: cadetblue; border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder;">Translate</div></td>
            <td><div style="height: 100px; width: 100px; background-color: cadetblue; border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder; transform: translate(50px, 35px);">Translate</div></td>

        </tr>

        <tr>

            <td><div style="height: 100px; width: 100px; background-color: rgb(160, 95, 157); border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder;">Rotate</div></td>
            <td><div style="height: 100px; width: 100px; background-color: rgb(160, 95, 157); border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder; transform: rotate(30deg);">Rotate</div></td>


        </tr>

        <tr>

            <td><div style="height: 100px; width: 100px; background-color: rgb(160, 95, 95); border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder;">Scale</div></td>
            <td><div style="height: 100px; width: 100px; background-color: rgb(160, 95, 95); border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder; transform: scale(1.5);">Scale</div></td>

        </tr>

        <tr>

            <td><div style="height: 100px; width: 100px; background-color: rgb(95, 160, 112); border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder;">Skew</div></td>
            <td><div style="height: 100px; width: 100px; background-color: rgb(95, 160, 112); border: 2px solid black; line-height: 100px; text-align: center; font-weight: bolder; transform: skew(20deg, 40deg);">Skew</div></td>

        </tr>

    </table>

</body>

</html>
