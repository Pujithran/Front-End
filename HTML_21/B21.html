    <style>

        .car{
            animation-name: moveCar;
            animation-duration: 6s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .tank{
            animation-name: moveCar2;
            animation-duration: 6s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes moveCar{
            0%{transform: translate(-400px, -1320px);}

            30%{transform: translate(1500px, -1320px);}

            40%{transform: translate(2000px, -1230px);}

            100%{transform: translate(4500px, -1230px);}
        }

        @keyframes moveCar2{
            0%{transform: translate(-400px, -1420px);}

            100%{transform: translate(4000px, -1420px);}
        }

    </style>
