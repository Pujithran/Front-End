<!DOCTYPE html>

<html lang="en">

    <head>

        <title>Document</title>

        <style>

            body{
                background-color: rgb(56, 56, 56);
            }

            nav{
                display: flex;
                justify-content: space-between;

                width: 70%; 
                height: 70px;
                
                border-radius: 30px;
                border: 1px solid rgb(68, 68, 68);
                
                margin-top: 10px;

                background-color: rgba(24, 24, 24, 0.74);
            }

            .iPhone17Pro{
                flex: 1; 
                
                line-height: 70px; 
                
                font-size: larger; 
                font-weight: 700;

                color: white;
            }

            .exploreAndBuyBox{
                display: flex; 
                flex: 1; 
                gap: 10px;
            }

            .explore{
                flex: 3; 
                
                height: 25px;

                border: 1px solid rgb(255, 255, 255);
                border-radius: 18px;

                margin-top: 16px;  
                padding: 5px;
                
                color: white;

                font-weight: bold;
            }

            .buy{
                flex: 2; 

                height: 25px;

                border-radius: 18px; 
                
                margin-top: 16px; 
                margin-right: 20px;  
                
                padding: 5px;
                
                color: white;
                background-color: blue;
                font-weight: bold;
            }

            .info{
                width: 100%;
                height: 300px;

                position: relative;
            }

            .highlights{
                color: white;

                font-size: 300%;
                font-weight: bold;

                position: absolute;
                top: 30px;
                left: 30px;
            }

            .watch{
                color: #2997ff;

                font-size: 120%;

                position: absolute;
                top: 50px;
                right: 100px;


            }

            .play{
                position: absolute;
                top: 50px;
                right: 100px;
            }

        </style>

    </head>

    <body>
        
        <center>

            <nav>
                <div class="iPhone17Pro">iPhone 17 Pro</div>
                <!-- <div style="flex: 4;"></div> -->
                <div class="exploreAndBuyBox">
                    <div class="explore">Explore</div>
                    <div class="buy">Buy</div>
                </div>
            </nav>

        </center>

        <div class="info">

            <div class="highlights">Get the highlights.</div>

            <div class="watch">Watch the film <img src="./play-circle-svgrepo-com.png" height="30px" class="play"> </div>

        </div>

    </body>

</html>
